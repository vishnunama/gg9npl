<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>420% Welcome Bonus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-green: #00FF88;
            --primary-dark: #1c1d1c;
            --secondary-green: #00cc6f;
            --text-white: #ffffff;
            --text-gray: #b0b5c0;
            --accent-teal: #00d4d4;
        }

        html {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: #1c1d1c;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #1c1d1c;
            color: var(--text-white);
            overflow-x: hidden;
            min-height: 100vh;
            padding: 0;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        .container {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            padding: 16px 0px;
        }

        /* Header Section */
        .header-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        .crown-icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
            animation: bounce 1.5s ease-in-out infinite;
            animation-delay: 0.2s;
        }

        .main-number {
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--accent-teal) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 8px;
            letter-spacing: -2px;
            animation: scaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .bonus-label {
            font-size: 24px;
            color: var(--primary-green);
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .bonus-subtitle {
            font-size: 13px;
            color: var(--text-gray);
            line-height: 1.6;
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }

        .hindi-text {
            font-size: 13px;
            color: var(--primary-green);
            margin-bottom: 4px;
            font-weight: 500;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        /* Bonus Types Section */
        .bonus-types {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin: 32px 0;
            animation: fadeInUp 0.8s ease-out 0.5s both;
        }

        .bonus-card {
            background: rgba(0, 255, 136, 0.08);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .bonus-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .bonus-card:hover {
            background: rgba(0, 255, 136, 0.15);
            border-color: rgba(0, 255, 136, 0.4);
            transform: translateY(-4px);
        }

        .bonus-card:hover::before {
            opacity: 1;
        }

        .bonus-icon {
            font-size: 28px;
            margin-bottom: 8px;
            display: block;
        }

        .bonus-percent {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary-green);
            margin-bottom: 4px;
        }

        .bonus-type-text {
            font-size: 10px;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        /* Buttons Section */
        .buttons-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: fadeInUp 0.8s ease-out 0.6s both;
            max-width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        .action-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: linear-gradient(90deg, #00a8cc 0%, #00ff88 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            text-align: left;
            width: 100%;
            box-sizing: border-box;
        }

        .action-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s ease;
            z-index: 0;
        }

        .action-button:hover::before {
            left: 100%;
        }

        .action-button:active {
            transform: scale(0.98);
        }

        .button-content {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            z-index: 1;
        }

        .button-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .button-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .button-text {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .arrow-icon {
            position: relative;
            z-index: 1;
            font-size: 20px;
            transition: transform 0.3s ease;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .action-button:hover .arrow-icon {
            transform: translateX(4px);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding-top: 20px;
            font-size: 12px;
            color: var(--text-gray);
            animation: fadeInUp 0.8s ease-out 0.7s both;
        }

        /* Character Container */
        .character-container {
            position: relative;
            height: 200px;
            margin: 20px 0 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, rgba(0, 255, 136, 0.05), transparent);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 136, 0.1);
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .character-placeholder {
            font-size: 80px;
            opacity: 0.3;
            animation: float 3s ease-in-out infinite;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }



        /* Image Container */
        .image-container {
            width: 100%;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .image-container img {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 16px;
            object-fit: cover;
        }

        /* Glow Effect */
        .glow-box {
            position: relative;
            background: rgba(0, 255, 136, 0.03);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 16px;
            padding: 24px 16px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .glow-box::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.1), transparent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>

</body>
</html>
